name: macOS native wallpaper probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-state:
    name: Untouched native state / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-15-intel]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install .
      - name: Inspect untouched WallpaperAgent state and installed assets
        run: python tests/integration/macos_wallpaper_inventory.py
