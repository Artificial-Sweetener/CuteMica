name: Native screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos:
    name: macOS / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            label: apple-silicon
          - runner: macos-15-intel
            label: intel
    env:
      CUTEMICA_CAPTURE_WALLPAPER: ${{ secrets.CUTEMICA_CAPTURE_WALLPAPER }}
      QT_QPA_PLATFORM: cocoa
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e .
      - name: Restore ephemeral wallpaper source
        run: >-
          python -c "import base64, os;
          open('capture-wallpaper.jpg', 'wb').write(
          base64.b64decode(os.environ['CUTEMICA_CAPTURE_WALLPAPER'], validate=True))"
      - name: Capture light and dark materials
        run: |
          mkdir -p captures
          python -m cutemica.demo.main --wallpaper capture-wallpaper.jpg --theme light --width 900 --height 620 --x 120 --y 90 --screenshot "captures/macos-${{ matrix.label }}-light.png"
          python -m cutemica.demo.main --wallpaper capture-wallpaper.jpg --theme dark --width 900 --height 620 --x 120 --y 90 --screenshot "captures/macos-${{ matrix.label }}-dark.png"
      - uses: actions/upload-artifact@v4
        with:
          name: cutemica-macos-${{ matrix.label }}
          path: captures/*.png
          if-no-files-found: error

  linux:
    name: Linux / ${{ matrix.label }}
    runs-on: ubuntu-24.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ubuntu:24.04
            label: ubuntu-24.04
            family: debian
          - image: debian:13
            label: debian-13
            family: debian
          - image: fedora:44
            label: fedora-44
            family: fedora
    env:
      CUTEMICA_CAPTURE_WALLPAPER: ${{ secrets.CUTEMICA_CAPTURE_WALLPAPER }}
      QT_QPA_PLATFORM: xcb
    steps:
      - name: Install Debian-family runtime
        if: matrix.family == 'debian'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates fonts-dejavu-core git libdbus-1-3 libegl1 libfontconfig1 libglib2.0-0t64 libx11-xcb1 libxcb-cursor0 libxkbcommon-x11-0 libxrender1 python3 python3-pip python3-venv xauth xvfb
      - name: Install Fedora runtime
        if: matrix.family == 'fedora'
        run: >-
          dnf install -y ca-certificates dbus-libs dejavu-sans-fonts fontconfig git
          libX11-xcb libXrender libxkbcommon-x11 libxcb mesa-libEGL python3
          python3-pip qt6-qtbase-gui xcb-util-cursor xorg-x11-server-Xvfb
      - uses: actions/checkout@v6
      - name: Install CuteMica
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .
      - name: Restore ephemeral wallpaper source
        run: >-
          .venv/bin/python -c "import base64, os;
          open('capture-wallpaper.jpg', 'wb').write(
          base64.b64decode(os.environ['CUTEMICA_CAPTURE_WALLPAPER'], validate=True))"
      - name: Capture light and dark materials
        run: |
          mkdir -p captures
          xvfb-run -a -s "-screen 0 1440x960x24" .venv/bin/python -m cutemica.demo.main --wallpaper capture-wallpaper.jpg --theme light --width 900 --height 620 --x 120 --y 90 --screenshot "captures/${{ matrix.label }}-light.png"
          xvfb-run -a -s "-screen 0 1440x960x24" .venv/bin/python -m cutemica.demo.main --wallpaper capture-wallpaper.jpg --theme dark --width 900 --height 620 --x 120 --y 90 --screenshot "captures/${{ matrix.label }}-dark.png"
      - uses: actions/upload-artifact@v4
        with:
          name: cutemica-${{ matrix.label }}
          path: captures/*.png
          if-no-files-found: error
